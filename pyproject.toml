[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "open-anonymizer"
version = "0.1.0"
description = "A local desktop app for de-identifying medical text with Deduced."
readme = "README.md"
requires-python = ">=3.9,<3.13"
license = { text = "MIT" }
authors = [
  { name = "Stig Hellemans" }
]
dependencies = [
  "PySide6>=6.6,<6.8",
  "pypdf>=5.7,<6",
  "pypdfium2>=4.30,<5",
  "deduce @ git+https://github.com/aenglebert/deduced.git@master",
]

[project.optional-dependencies]
dev = [
  "PyInstaller>=6.3,<7",
  "pytest>=8.0,<9",
  "pytest-qt>=4.4,<5",
]

[project.scripts]
open-anonymizer = "open_anonymizer.main:main"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
