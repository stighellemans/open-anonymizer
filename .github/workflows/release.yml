name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform: macos
            arch: arm64
          - runner: macos-15-intel
            platform: macos
            arch: x64
          - runner: windows-latest
            platform: windows
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Build application
        run: python scripts/build_desktop.py

      - name: Create macOS disk image
        if: matrix.platform == 'macos'
        run: python scripts/build_macos_dmg.py --output-path release/open-anonymizer-macos-${{ matrix.arch }}.dmg

      - name: Install Inno Setup
        if: matrix.platform == 'windows'
        run: choco install innosetup --no-progress -y

      - name: Create Windows installer
        if: matrix.platform == 'windows'
        run: python scripts/build_windows_installer.py

      - name: Create stable Windows download alias
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem "release/OpenAnonymizer-*-Setup.exe" | Select-Object -First 1
          if ($null -eq $installer) {
            throw "Could not find the versioned Windows installer in release/."
          }
          Copy-Item $installer.FullName "release/open-anonymizer-windows-setup.exe" -Force

      - name: Upload macOS build artifact
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/open-anonymizer-macos-${{ matrix.arch }}.dmg
          if-no-files-found: error

      - name: Upload Windows build artifact
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/open-anonymizer-windows-setup.exe
          if-no-files-found: error

  publish:
    needs:
      - build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/release-macos-arm64/open-anonymizer-macos-arm64.dmg
            release-artifacts/release-macos-x64/open-anonymizer-macos-x64.dmg
            release-artifacts/release-windows-x64/open-anonymizer-windows-setup.exe
          fail_on_unmatched_files: true
