name: Package Artifacts

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform: macos
            arch: arm64
          - runner: macos-15-intel
            platform: macos
            arch: x64
          - runner: windows-latest
            platform: windows
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Build application
        run: python scripts/build_desktop.py

      - name: Create macOS disk image
        if: matrix.platform == 'macos'
        run: python scripts/build_macos_dmg.py --output-path release/open-anonymizer-macos-${{ matrix.arch }}.dmg

      - name: Install Inno Setup
        if: matrix.platform == 'windows'
        run: choco install innosetup --no-progress -y

      - name: Create Windows installer
        if: matrix.platform == 'windows'
        run: python scripts/build_windows_installer.py

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: packaged-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/*
          if-no-files-found: error
