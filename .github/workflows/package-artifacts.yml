name: Package Artifacts

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Build application
        run: python scripts/build_desktop.py

      - name: Create macOS release archive
        if: runner.os == 'macOS'
        run: |
          mkdir -p release
          ditto -c -k --keepParent dist/OpenAnonymizer.app release/open-anonymizer-macos.zip

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        run: choco install innosetup --no-progress -y

      - name: Create Windows installer
        if: runner.os == 'Windows'
        run: python scripts/build_windows_installer.py

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: packaged-${{ runner.os }}
          path: release/*
          if-no-files-found: error
